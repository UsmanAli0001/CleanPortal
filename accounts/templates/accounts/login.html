{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Clean Pak Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #16a34a;
            --primary-blue: #1a56db;
            --soft-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --error-red: #ef4444;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden !important;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)),
            url("{% static 'accounts/images/login.png' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            width: 100%;
            max-width: 450px;
            padding: 45px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            width: 75px;
            height: 75px;
            margin: 0 auto 15px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(22, 163, 74, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
        }

        .brand-logo img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #0f172a;
        }

        .brand h1 span {
            color: var(--primary-green);
            text-shadow: 0 0 20px rgba(22, 163, 74, 0.2);
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.4);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            color: #0f172a;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.1);
        }

        .pw-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 5px;
            border-radius: 8px;
        }

        .pw-toggle:hover {
            color: #2563eb;
            background: rgba(37, 99, 235, 0.1);
            transform: translateY(-50%) scale(1.15);
            filter: drop-shadow(0 0 8px rgba(37, 99, 235, 0.3));
        }

        .pw-toggle:active {
            transform: translateY(-50%) scale(0.9);
        }

        .pw-toggle i {
            width: 20px;
            height: 20px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-blue);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 0.9rem;
            font-weight: 700;
            color: #2563eb;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary-blue), #1e40af);
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(26, 86, 219, 0.2);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(26, 86, 219, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .auth-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: #16a34a;
            font-weight: 800;
            text-decoration: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
        }

        .alert-error {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #bbf7d0;
        }



        /* Custom icons for inputs */
        .field-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            opacity: 0.5;
        }

        /* input { padding-left: 48px !important; } */

        /* --- Cinematic Toast Notifications --- */
        #toast-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .cinematic-toast {
            pointer-events: auto;
            width: 400px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 2px solid #3b82f6;
            border-radius: 24px;
            padding: 22px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15),
                0 0 25px rgba(59, 130, 246, 0.3);
            transform: translateX(120%) scale(0.9);
            transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            text-align: left;
            margin-bottom: 5px;
        }

        .cinematic-toast:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.2),
                0 0 35px rgba(59, 130, 246, 0.5);
        }

        .cinematic-toast.show {
            transform: translateX(0) scale(1);
        }

        .cinematic-toast::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 8px;
            height: 100%;
            background: #3b82f6;
            box-shadow: 2px 0 10px rgba(59, 130, 246, 0.4);
        }

        .toast-icon {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.6rem;
            background: #eff6ff;
            color: #3b82f6;
            transition: 0.3s;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 900;
            font-size: 1.15rem;
            color: #0f172a;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .toast-message {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.5;
            font-weight: 600;
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            background: rgba(0, 0, 0, 0.03);
            width: 100%;
        }

        .toast-progress-fill {
            height: 100%;
            background: #3b82f6;
            width: 100%;
            transform-origin: left;
            animation: shrink 5s linear forwards;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .toast-success {
            border-color: #3b82f6;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 25px rgba(59, 130, 246, 0.3);
        }

        .toast-success::before {
            background: linear-gradient(180deg, #3b82f6, #1d4ed8);
        }

        .toast-success .toast-icon {
            background: #eff6ff;
            color: #3b82f6;
        }

        .toast-success .toast-progress-fill {
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .toast-error {
            border-color: #ef4444;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 25px rgba(239, 68, 68, 0.3);
        }

        .toast-error::before {
            background: #ef4444;
        }

        .toast-error .toast-icon {
            background: #fef2f2;
            color: #ef4444;
        }

        .toast-error .toast-progress-fill {
            background: #ef4444;
        }

        @keyframes shrink {
            from {
                transform: scaleX(1);
            }

            to {
                transform: scaleX(0);
            }
        }
    </style>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="auth-card">
        <div class="brand">
            <div class="brand-logo">
                <img src="{% static 'accounts/images/newlogo_emblem.png' %}" alt="Clean Pak Portal Logo">
            </div>
            <h1>Clean Pak <span>Portal</span></h1>
            <p>Login to your portal</p>
        </div>

        <!-- Toasts replaced alerts -->

        <form id="loginForm" method="POST" action="{% url 'login' %}" autocomplete="on">
            {% csrf_token %}

            <div class="form-group">
                <label>Email or Username</label>
                <div class="input-wrapper">
                    {{ form.email }}
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    {{ form.password }}
                    <button type="button" class="pw-toggle" onclick="togglePw(this)">
                        <i data-lucide="eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    {{ form.remember_me }}
                    <span>Remember Me</span>
                </label>
                <a href="{% url 'account_reset_password' %}" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span class="btn-text">Connect to Portal</span>
                <div class="spinner"></div>
            </button>
        </form>



        <div class="auth-footer">
            New to Clean Pak Portal? <a href="{% url 'register' %}">Create Account</a>
        </div>
    </div>

    <script>
        // Cinematic Toast Controller
        const Toast = {
            container: null,
            init() {
                this.container = document.createElement('div');
                this.container.id = 'toast-container';
                document.body.appendChild(this.container);
            },
            show(title, message, type = 'success', duration = 5000) {
                if (!this.container) this.init();
                const toast = document.createElement('div');
                toast.className = `cinematic-toast toast-${type}`;
                let icon = type === 'success' ? 'check-circle' : 'alert-circle';
                toast.innerHTML = `
                <div class="toast-icon"><i data-lucide="${icon}"></i></div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <div class="toast-progress">
                    <div class="toast-progress-fill" style="animation-duration: ${duration}ms"></div>
                </div>
            `;
                this.container.appendChild(toast);
                lucide.createIcons();
                setTimeout(() => toast.classList.add('show'), 100);
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 600);
                }, duration);
            }
        };

        lucide.createIcons();

        // Handle Django Messages
        {% if messages %}
        document.addEventListener('DOMContentLoaded', () => {
            {% for message in messages %}
            let type = '{{ message.tags }}' === 'error' ? 'error' : 'success';
            let title = type === 'success' ? 'Portal Success' : 'Access Denied';
            Toast.show(title, "{{ message|escapejs }}", type);
            {% endfor %}
        });
        {% endif %}

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.querySelector('.btn-text');
        const spinner = document.querySelector('.spinner');

        function togglePw(btn) {
            const pwInput = document.querySelector('input[type="password"]') || document.querySelector('input[name="password"]') || document.getElementById('password');
            const icon = btn.querySelector('i');

            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                pwInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        form.addEventListener('submit', () => {
            submitBtn.disabled = true;
            btnText.innerText = 'Logging in...';
            spinner.style.display = 'block';

            // Signal to dashboard that we just logged in
            sessionStorage.setItem('justLoggedIn', 'true');
            sessionStorage.removeItem('introPlayed');
        });

        window.addEventListener('load', () => {
            sessionStorage.removeItem('introPlayed');
            // Explicitly clear the form to prevent browser pre-fill persistence
            if (form) form.reset();
        });
    </script>

</body>

</html>
