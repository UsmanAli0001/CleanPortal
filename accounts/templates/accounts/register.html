{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Clean Pak Portal</title>
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}">
</head>
<body>
   <!-- CleanPak Portal Header -->

<div class="auth-bg">
    <div class="auth-card">
        <div class="portal-header">
        <img src="{% static 'accounts/images/logo.png' %}" alt="Clean Pak Portal Logo" class="portal-logo">
        <h3 class="portal-title">Clean Pak Portal</h3>
    </div>
        <h2>Create Account</h2>

        <!-- Messages -->
        {% if messages %}
            {% for message in messages %}
                <p class="{% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <!-- Registration Form -->
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <input type="text" name="first_name" placeholder="First Name" required>
            <input type="text" name="last_name" placeholder="Last Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <div class="password-field">
    <input type="password" id="password" name="password" placeholder="Password" required>
    <span class="toggle-password" onclick="togglePassword()"></span>
</div>
<p id="password-message" class="password-msg"></p>
            <input type="password" name="confirm" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
</div>
</body>
</html>
