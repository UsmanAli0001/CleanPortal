{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Pak Portal - Intelligent Schedule Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: rgba(33, 38, 45, 0.6);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-primary: #58a6ff;
            --accent-hover: #79c0ff;
            --status-scheduled: #d2a8ff;
            --status-progress: #58a6ff;
            --status-completed: #3fb950;
        }

        body {
            background: radial-gradient(circle at top left, #121d2f, var(--bg-color));
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* Navbar reused */
        .navbar {
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--surface-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h2 {
            margin: 0;
            background: linear-gradient(90deg, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: var(--text-primary);
            margin: 0 15px;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--accent-primary);
        }

        .nav-buttons button {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
        }

        .login-btn {
            background: var(--surface-color);
            color: var(--text-primary);
            border: 1px solid var(--surface-border);
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Layout */
        .dashboard-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 20px;
            padding: 30px 50px;
            max-width: 1400px;
            margin: auto;
        }

        /* Sidebar Filters */
        .sidebar {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
        }

        .sidebar h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--surface-border);
            color: white;
            border-radius: 8px;
            font-family: 'Outfit';
            outline: none;
        }

        /* Tabs */
        .service-tabs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .service-tab {
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
        }

        .service-tab.active {
            background: var(--accent-primary);
            color: #000;
            border-color: var(--accent-primary);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Top Actions */
        .top-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-view {
            display: flex;
            gap: 10px;
        }

        .toggle-btn {
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .toggle-btn.active {
            background: white;
            color: black;
        }

        /* Timeline / Cards */
        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .schedule-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .schedule-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .schedule-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
        }

        .schedule-card[data-status="Scheduled"]::before {
            background: var(--status-scheduled);
        }

        .schedule-card[data-status="In Progress"]::before {
            background: var(--status-progress);
        }

        .schedule-card[data-status="Completed"]::before {
            background: var(--status-completed);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .service-type {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.scheduled {
            background: rgba(210, 168, 255, 0.2);
            color: var(--status-scheduled);
        }

        .status-badge.progress {
            background: rgba(88, 166, 255, 0.2);
            color: var(--status-progress);
        }

        .status-badge.completed {
            background: rgba(63, 185, 80, 0.2);
            color: var(--status-completed);
        }

        .card-body p {
            margin: 5px 0;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Outfit';
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-report {
            background: rgba(248, 81, 73, 0.1);
            color: #f85149;
            border: 1px solid rgba(248, 81, 73, 0.3);
        }

        .btn-report:hover {
            background: rgba(248, 81, 73, 0.2);
        }

        .btn-notify {
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            border: 1px solid rgba(88, 166, 255, 0.3);
        }

        .btn-notify:hover {
            background: rgba(88, 166, 255, 0.2);
        }

        /* Notification Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: rgba(33, 38, 45, 0.9);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--accent-primary);
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Calendar Grid View (Mock) */
        .calendar-view {
            display: none;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .cal-day {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            padding: 10px;
            min-height: 100px;
        }

        .cal-date {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .cal-event {
            background: rgba(88, 166, 255, 0.2);
            border-left: 3px solid var(--accent-primary);
            padding: 5px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 5px;
            cursor: pointer;
        }

        @media(max-width: 768px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .navbar {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h2>Clean Pak Portal</h2>
        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'dashboard' %}">Dashboard</a>
        </div>
        <div class="nav-buttons">
            <a href="{% url 'logout' %}"><button class="login-btn">Logout</button></a>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- Sidebar Filter -->
        <div class="sidebar">
            <h3>Filters</h3>
            <div class="filter-group">
                <label>📍 Select Zone/Area</label>
                <select id="areaFilter">
                    <option value="All">All Areas</option>
                    <option value="Downtown">Downtown</option>
                    <option value="Uptown">Uptown</option>
                    <option value="Suburbs">Suburbs</option>
                </select>
            </div>
            <div class="filter-group">
                <label>📅 Date</label>
                <input type="date" id="dateFilter">
            </div>

            <div class="filter-group">
                <label>🧹 Service Type</label>
                <div class="service-tabs">
                    <button class="service-tab active" data-type="All">All Services</button>
                    <button class="service-tab" data-type="Street Cleaning">Street Cleaning</button>
                    <button class="service-tab" data-type="Garbage Pickup">Garbage Pickup</button>
                    <button class="service-tab" data-type="Drain Cleaning">Drain Cleaning</button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-actions">
                <div>
                    <h2 style="margin:0;">Schedule Dashboard</h2>
                    <p style="margin:5px 0 0 0; color:var(--text-secondary);">Today's Plan and Upcoming Routes</p>
                </div>
                <div class="toggle-view">
                    <button class="toggle-btn active" id="btnTimeline">Timeline</button>
                    <button class="toggle-btn" id="btnCalendar">Calendar</button>
                </div>
            </div>

            <!-- Timeline View -->
            <div id="timelineView" class="schedule-grid">
                <!-- Data injected via JS -->
            </div>

            <!-- Calendar View -->
            <div id="calendarView" class="calendar-view">
                <h3>Weekly View</h3>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Data injected via JS -->
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    {{ schedules_json|json_script:"schedule-data" }}

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const rawData = document.getElementById('schedule-data').textContent;
            let schedules = [];
            try {
                schedules = JSON.parse(rawData);
            } catch (e) { console.error("Error parsing schedule data:", e); }

            const timelineView = document.getElementById("timelineView");
            const calendarView = document.getElementById("calendarView");
            const calendarGrid = document.getElementById("calendarGrid");
            const areaFilter = document.getElementById("areaFilter");
            const dateFilter = document.getElementById("dateFilter");
            const serviceTabs = document.querySelectorAll(".service-tab");

            // Set today's date in filter
            const today = new Date().toISOString().split('T')[0];
            dateFilter.value = today;

            let currentArea = "All";
            let currentDate = today;
            let currentType = "All";

            function renderSchedules() {
                const filtered = schedules.filter(s => {
                    const matchArea = currentArea === "All" ? true : s.area === currentArea;
                    const matchDate = currentDate === "" ? true : s.date === currentDate;
                    const matchType = currentType === "All" ? true : s.service_type === currentType;
                    return matchArea && matchDate && matchType;
                });

                // Render Timeline
                timelineView.innerHTML = "";
                if (filtered.length === 0) {
                    timelineView.innerHTML = "<p style='color:var(--text-secondary);'>No schedules found for selected filters.</p>";
                }

                filtered.forEach(s => {
                    const statusClass = s.status === 'Completed' ? 'completed' : (s.status === 'In Progress' ? 'progress' : 'scheduled');
                    const icon = s.status === 'Completed' ? '🟢' : (s.status === 'In Progress' ? '🔵' : '🟡');
                    const timeIcon = s.time_slot === 'Morning' ? '🌅' : '🌙';

                    const card = document.createElement("div");
                    card.className = "schedule-card";
                    card.setAttribute("data-status", s.status);
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="service-type">${s.service_type}</span>
                            <span class="status-badge ${statusClass}">${icon} ${s.status}</span>
                        </div>
                        <div class="card-body">
                            <p>📍 ${s.area}</p>
                            <p>📅 ${s.date}</p>
                            <p>${timeIcon} ${s.time_slot} Slot</p>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn btn-notify" onclick="showNotification('Reminder set for ${s.service_type} in ${s.area}')">🔔 Notify Me</button>
                            <button class="action-btn btn-report" onclick="window.location.href='/complaint/?area=${s.area}'">📸 Report Issue</button>
                        </div>
                    `;
                    timelineView.appendChild(card);
                });

                renderCalendar(filtered);
            }

            function renderCalendar(filtered) {
                calendarGrid.innerHTML = "";
                // Mock 7 days
                let d = new Date();
                for (let i = 0; i < 7; i++) {
                    let dStr = d.toISOString().split('T')[0];
                    let dayEvents = filtered.filter(f => f.date === dStr);

                    let col = document.createElement("div");
                    col.className = "cal-day";
                    col.innerHTML = `<div class="cal-date">${d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>`;

                    dayEvents.forEach(e => {
                        col.innerHTML += `<div class="cal-event" onclick="showNotification('Viewing ${e.service_type}')">${e.service_type} (${e.time_slot})</div>`;
                    });

                    calendarGrid.appendChild(col);
                    d.setDate(d.getDate() + 1);
                }
            }

            // Event Listeners
            areaFilter.addEventListener("change", (e) => { currentArea = e.target.value; renderSchedules(); });
            dateFilter.addEventListener("change", (e) => { currentDate = e.target.value; renderSchedules(); });

            serviceTabs.forEach(tab => {
                tab.addEventListener("click", (e) => {
                    serviceTabs.forEach(t => t.classList.remove("active"));
                    e.target.classList.add("active");
                    currentType = e.target.getAttribute("data-type");
                    renderSchedules();
                });
            });

            document.getElementById("btnTimeline").addEventListener("click", (e) => {
                e.target.classList.add("active");
                document.getElementById("btnCalendar").classList.remove("active");
                timelineView.style.display = "grid";
                calendarView.style.display = "none";
            });

            document.getElementById("btnCalendar").addEventListener("click", (e) => {
                e.target.classList.add("active");
                document.getElementById("btnTimeline").classList.remove("active");
                timelineView.style.display = "none";
                calendarView.style.display = "block";
            });

            // Make showNotification global
            window.showNotification = function (msg) {
                const container = document.getElementById("toastContainer");
                const toast = document.createElement("div");
                toast.className = "toast";
                toast.innerHTML = msg;
                container.appendChild(toast);

                setTimeout(() => toast.classList.add("show"), 100);
                setTimeout(() => {
                    toast.classList.remove("show");
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            };

            // Init
            renderSchedules();
        });
    </script>
</body>

</html>
