{% extends "admin/login.html" %}

{% block extrahead %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
    /* --- Cinematic Toast Notifications for Django Admin Login --- */
    #toast-container {
        position: fixed !important;
        top: 30px !important;
        right: 30px !important;
        z-index: 999999 !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 15px !important;
        pointer-events: none !important;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    }

    .cinematic-toast {
        pointer-events: auto !important;
        width: 380px !important;
        background: rgba(255, 255, 255, 0.95) !important;
        backdrop-filter: blur(25px) !important;
        -webkit-backdrop-filter: blur(25px) !important;
        border: 2px solid #3b82f6 !important;
        border-radius: 20px !important;
        padding: 18px 22px !important;
        display: flex !important;
        align-items: center !important;
        gap: 16px !important;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 
                    0 0 30px rgba(59, 130, 246, 0.25) !important;
        transform: translateX(120%) scale(0.9) !important;
        opacity: 0 !important;
        transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                    opacity 0.5s ease-out !important;
        position: relative !important;
        overflow: hidden !important;
        text-align: left !important;
    }

    .cinematic-toast.show {
        transform: translateX(0) scale(1) !important;
        opacity: 1 !important;
    }

    .cinematic-toast::before {
        content: '' !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 6px !important;
        height: 100% !important;
        background: #3b82f6 !important;
        box-shadow: 2px 0 10px rgba(59, 130, 246, 0.4) !important;
    }

    .toast-icon {
        width: 46px !important;
        height: 46px !important;
        border-radius: 50% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        flex-shrink: 0 !important;
        background: #eff6ff !important;
        color: #3b82f6 !important;
    }

    .toast-content {
        flex: 1 !important;
    }

    .toast-title {
        font-weight: 800 !important;
        font-size: 1.05rem !important;
        color: #0f172a !important;
        margin-bottom: 2px !important;
        letter-spacing: -0.3px !important;
    }

    .toast-message {
        font-size: 0.9rem !important;
        color: #475569 !important;
        line-height: 1.4 !important;
        font-weight: 600 !important;
    }

    .toast-progress {
        position: absolute !important;
        bottom: 0 !important;
        left: 0 !important;
        height: 4px !important;
        background: rgba(0, 0, 0, 0.03) !important;
        width: 100% !important;
    }

    .toast-progress-fill {
        height: 100% !important;
        background: linear-gradient(90deg, #3b82f6, #60a5fa) !important;
        width: 100% !important;
        transform-origin: left !important;
        animation: shrink 5s linear forwards !important;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.5) !important;
    }

    .toast-success {
        border-color: #3b82f6 !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 25px rgba(59, 130, 246, 0.25) !important;
    }

    .toast-success::before {
        background: linear-gradient(180deg, #3b82f6, #1d4ed8) !important;
    }

    .toast-success .toast-icon {
        background: #eff6ff !important;
        color: #3b82f6 !important;
    }

    .toast-success .toast-progress-fill {
        background: linear-gradient(90deg, #3b82f6, #60a5fa) !important;
    }

    .toast-error {
        border-color: #ef4444 !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12), 0 0 25px rgba(239, 68, 68, 0.25) !important;
    }

    .toast-error::before {
        background: #ef4444 !important;
    }

    .toast-error .toast-icon {
        background: #fef2f2 !important;
        color: #ef4444 !important;
    }

    .toast-error .toast-progress-fill {
        background: #ef4444 !important;
    }

    @keyframes shrink {
        from {
            transform: scaleX(1);
        }
        to {
            transform: scaleX(0);
        }
    }
</style>
{% endblock %}

{% block content %}
{{ block.super }}
<script>
    // Cinematic Toast Controller
    const Toast = {
        container: null,
        init() {
            this.container = document.createElement('div');
            this.container.id = 'toast-container';
            document.body.appendChild(this.container);
        },
        show(title, message, type = 'success', duration = 5000) {
            if (!this.container) this.init();
            const toast = document.createElement('div');
            toast.className = `cinematic-toast toast-${type}`;
            
            // Premium Inline SVG icons for maximum reliability & instant loading
            let iconSvg = '';
            if (type === 'success') {
                iconSvg = `
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                `;
            } else {
                iconSvg = `
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                `;
            }

            toast.innerHTML = `
                <div class="toast-icon">${iconSvg}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <div class="toast-progress">
                    <div class="toast-progress-fill" style="animation-duration: ${duration}ms"></div>
                </div>
            `;
            this.container.appendChild(toast);
            
            // Direct DOM style flow to prevent jumpiness on initial layout
            requestAnimationFrame(() => {
                setTimeout(() => toast.classList.add('show'), 50);
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 600);
            }, duration);
        }
    };

    document.addEventListener('DOMContentLoaded', () => {
        // Handle Django Messages
        {% if messages %}
            {% for message in messages %}
                let type = '{{ message.tags }}' === 'error' ? 'error' : 'success';
                let title = type === 'success' ? 'Admin Portal' : 'Access Denied';
                Toast.show(title, "{{ message|escapejs }}", type);
            {% endfor %}
        {% endif %}
    });
</script>
{% endblock %}
