{% load static %}
{% load i18n %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Password Reset Sent" %} — Clean Pak Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #1a56db;
            --soft-bg: #f8fafc;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
            url("{% static 'accounts/images/login.png' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            width: 100%;
            max-width: 450px;
            padding: 45px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-success {
            width: 70px; height: 70px; margin: 0 auto 25px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        h1 { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin-bottom: 15px; }
        p { color: var(--text-muted); font-size: 1rem; line-height: 1.6; margin-bottom: 30px; }

        .btn-back {
            display: inline-block; width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary-blue), #1e40af);
            color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700;
            text-decoration: none; border-radius: 14px; transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(26, 86, 219, 0.2);
        }

        .btn-back:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(26, 86, 219, 0.3); }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="auth-card">
        <div class="icon-success">
            <i data-lucide="mail-check"></i>
        </div>
        <h1>{% trans "Check Your Email" %}</h1>
        <p>{% blocktrans %}We have sent you an e-mail. Please contact us if you do not receive it within a few minutes.{% endblocktrans %}</p>
        
        <a href="{% url 'login' %}" class="btn-back">
            {% trans "Back to Login" %}
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
